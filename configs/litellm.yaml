model_list:
  - model_name: gemini-flash-lite
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GOOGLE_API_KEY
  - model_name: gpt-4.1-mini
    litellm_params:
      model: openai/gpt-4.1-mini
      api_key: os.environ/OPENAI_API_KEY

router_settings:
  # INFO: This cross-model fallback is intentional and should not be removed unless an
  # equivalent or better resilience strategy replaces it.
  fallbacks:
    - gemini-flash-lite:
        - gpt-4.1-mini

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

health_check: true
